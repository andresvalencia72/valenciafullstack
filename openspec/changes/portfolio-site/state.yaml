      **PR12 resolve-blockers: CRITICAL-2 fix (2026-07-08).** The terminal verify report's CRITICAL-2 (Lighthouse Performance gate failing 88-89 on /es and /en) was investigated and fixed on `feat/pr12-tech-logos`. The report's own suggested root cause (icon SVGs shipping in the client JS bundle via the `Reveal`/`Tilt` client boundary) was independently re-tested and disproved: a `.next/static` grep found zero icon-related content either way, and stubbing `Reveal`/`Tilt` to plain pass-through did not move the Lighthouse score at all. A controlled A/B against a freshly-rebuilt `feat/pr11-hardening` baseline (same session/sandbox) confirmed the regression was real and code-linked (baseline 0.90/0.90/0.90 vs. PR12 0.88/0.89/0.89, same LCP element, same TTFB, delta isolated to Render Delay). The actual mechanism, isolated by systematically stripping only the rendered icon markup: the ~29KB of hand-drawn, multi-path/gradient inline SVG (`postgresql-icon.tsx` 9.3KB and `php-icon.tsx` 5.6KB are the largest contributors) landing synchronously in every request's initial SSR HTML delays the browser's LCP paint under Lighthouse's throttled-CPU mobile preset — independent of client bundle size or hydration cost. SVGO-based minification (`npx svgo`, no new dependency) was tried and found insufficient (~15% reduction, not enough margin). Fix: a new `LazyIcon` client component (`icons/lazy-icon.tsx`) dynamically `import()`s `SKILL_ICONS` inside a `useEffect` after mount, keeping the icon markup out of the initial SSR HTML entirely (code-split into its own ~28KB chunk, confirmed absent from the main bundle and the initial HTML) while still rendering the exact same inline SVG a moment after hydration — all required properties preserved (`aria-hidden`/`focusable=\"false\"`, namespaced gradient ids, `nextjs-icon`'s `fill=\"currentColor\"`, zero external requests, no new npm dependency). TDD: `lazy-icon.test.tsx` written first (RED: no file existed), `skill-badge.test.tsx`/`skills-section.test.tsx`'s existing icon-presence assertions updated to `waitFor` (RED: failed against the new async timing, then GREEN). Green: lint, typecheck, 460/460 unit tests (up from 457), coverage 97.54%/93.57%/96.38%/97.49% (no regression), build (22 routes, unchanged), `npm run lighthouse` PASSED (exit 0) — /es 0.89/0.90/0.90 (median 0.90), /en 0.90/0.90/0.90 (median 0.90), article page 0.95/0.96/0.96, all above the >=90 gate — 48/48 e2e (CI=1, real Docker Postgres, fresh build). ~85 changed lines, single commit, well within budget.

      **PR13: skills section design fidelity (2026-07-08, user-approved scope addition, not a tasks.md phase).** New branch `feat/pr13-skills-fidelity`, base=`feat/pr12-tech-logos` (new chain tip, feature-branch-chain). A design-vs-implementation comparison found the skills bento layout genuinely broken on md+ viewports: `md:col-span-2 md:row-span-2`/`md:col-span-2` sat on inner divs instead of the grid's real direct children (the `Reveal`/`Tilt` wrapper components, which did not forward `className`), so every bento span was dead CSS and all seven cards rendered 1x1 — missed by every prior quality gate (unit test asserted classes on the wrong element, e2e overflow check only ran at single-column 375px, Lighthouse doesn't check layout fidelity). Fixed by adding an optional `className` prop to `Reveal`/`Tilt` (backward-compatible, every other call site unaffected) and moving the span classes onto the actual grid children. Also shipped four smaller disclosed fidelity gaps, all skills-section-scoped per the user's explicit hard constraint (projects section and every other home section untouched): a section eyebrow (coral dash + mono uppercase label, new `home.skills.eyebrow` i18n key), a static salmon highlight behind the heading word (reusing `article-header.tsx`'s exact existing pattern — no `scaleX` reveal animation, a deliberate consistency choice, disclosed as a deviation from the design's animated version), a blurred decorative coral circle on the main-stack card's corner, and the learning-now card's icon rendered bare at ~42px instead of boxed in a `SkillBadge` (reusing the already-shipped `LazyIcon` deferred-loading mechanism directly, not duplicated). TDD throughout: the bento-span regression test was specifically designed to avoid repeating the exact test-design mistake that let the original bug ship silently (asserts span classes live on the grid's own direct `children`, and that the other five 1x1 cards do NOT have them); a new `e2e/skills-bento.spec.ts` als