ceholders to live GitHub Actions per-job status badges via shields.io's `job` query parameter (11.3); `e2e/engagement.spec.ts` (3 new cases) closing a genuine quality-pipeline E2E Test Gate gap — engagement previously had no dedicated e2e coverage, only an incidental side effect of `blog.spec.ts` (11.4 — full flow list now genuinely covered: locale switch, theme, filter, search, contact, article view, engagement, github activity); all seven `docs/adr/000N-*.md` files finalized from `Status: Draft (stub)` to `Status: Accepted`, each with a new Consequences section grounded in what actually shipped (11.5). No new env vars; one new devDependency (`@lhci/cli`); zero new eslint-boundaries edges. Green: lint, typecheck, 440/440 unit tests (up from 430), coverage 97.47%/93.48%/96.18%/97.42% (small nominal dip from PR10's 97.97/93.99/97.60/97.94 driven entirely by the two new CLI-wiring files' own uncovered wiring lines, same category as `sync-search.ts`; still comfortably above the 80% gate on every metric), build (22 routes, unchanged), `npm run verify:no-client-secrets` (zero leaks against a real build with canary secrets), `npm run lighthouse` (all three URLs pass all four thresholds, verified stable across 6 samples/URL), 48/48 e2e (up from 44/44), run against a real local Docker Postgres container (already running from a prior session) after `npm run db:migrate` + `npm run db:sync-search`, with `CI=1` and a stale dev-server process killed first (same recurring hazard class as PR3a/PR7/PR8/PR9). 747 hand-written changed lines (677 insertions / 70 deletions, excl. package-lock.json) — above the 400-line budget, disclosed with atomic-unit justification (see PR11 apply findings). **This is the final implementation slice in the chain** — no further PRs are planned; `sdd-verify` is next.

      **PR11 resolve-blockers (2026-07-07)**: CRITICAL-1 (verify-report.md) fixed on `feat/pr11-hardening` — added `min-w-0` to the repo-card grid item (`<li>`) and its flex-container child (`<a>`) in `github-activity-panel.tsx`, the standard fix for the CSS Grid `min-width: auto` overflow gotcha the verify report diagnosed. Added a unit test asserting the guard classes with a realistic long description; the two previously-failing `e2e/home-sections.spec.ts` mobile-viewport scenarios now pass (reproduced RED first against a real `GITHUB_TOKEN`, confirmed GREEN after the fix against a freshly rebuilt production server — the first e2e run after the fix falsely reused a stale pre-fix server via Playwright's `reuseExistingServer`, caught and corrected by killing it and rebuilding before re-running). Green: lint, typecheck, 441/441 unit tests (up from 440), coverage 97.47%/93.48%/96.18%/97.42% (unchanged), 48/48 e2e (up from 46/48). Commit `b721b69`, pushed to `feat/pr11-hardening`.

      **PR12 (user-approved scope addition, not a tasks.md phase — decided during this resolve-blockers session): tech logos.** New branch `feat/pr12-tech-logos`, base=`feat/pr11-hardening` (new chain tip). Replaces `SkillBadge`'s monogram-text placeholder (documented deviation since PR3a) with the real devicon brand SVGs the design-reference uses. Vendors 10 SVG files directly from the `devicon` npm package (v2.17.0, MIT) under `src/features/home/ui/icons/` — not added as a dependency (fetched once via `npm pack` into a temp dir). Covers docker/figma/git/javascript/nodejs/php/postgresql/react/typescript (each mapped to its `-original.svg`, the inherently multi-color variant — the design-reference's `-plain colored` CSS-font classes have no direct raw-SVG equivalent, `-original.svg` is the correct substitute) plus Next.js (`-plain.svg`, patched to `fill=\"currentColor\"` since its upstream default-black fill is invisible in dark mode, documented in the component). Found and fixed a real, would-have-been-silent bug: `nodejs-original.svg` and `php-original.svg` both use the bare gradient id `a` upstream, and both icons render inline on the same skills-section page — namespaced to `nodejs-icon-*`/`php-icon-a` to prevent a DOM id collision (empirically verified unique on the real built page, one instance each). `SkillBadge` now takes `icon: IconName` instead of `label: string`; `SkillEntry.icon` (`skills-data.ts`) replaces `SkillEntry.badge`, matching design-reference/'s `devicon-{name}-*` classes 1:1 for every skill card plus the main-stack card (React/TypeScript/Node.js). Icons stay `aria-hidden`, all existing accessible text unchanged. CSP (ADR-0007, `style-src 'self'`) unaffected — no font, no CDN, self-hosted inline SVG only. TDD throughout (RED confirmed for icons.test.tsx's import-resolution failure, skill-badge.test.tsx's icon-presence assertion, and skills-section.test.tsx's per-card icon-mapping assertion, before each corresponding implementation). Green: lint