g `e2e/blog.spec.ts` already exercises the mounted widget's real view POST against Docker Postgres). First e2e run showed 3 spurious `contact.spec.ts` failures from a stale pre-existing dev server on port 3000 (same hazard class as PR3a's documented finding, not a PR7 regression) — resolved by killing it and re-running with `CI=1`. 2021 hand-written changed lines (2018 insertions / 3 deletions, excl. package-lock.json — zero new dependencies, measured via git diff --stat) — above the 400-line budget, disclosed with atomic-unit justification (see PR7 apply findings).

