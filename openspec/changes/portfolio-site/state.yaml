  apply:
    status: done
    batch: PR12
    note: "PR1 (Phase 1) complete on feat/pr1-scaffolding (tasks 1.1-1.8). PR2 split post-apply into PR2a (feat/pr2a-design-system, base=PR1, tasks 2.1/2.2/2.3/2.5/2.6/2.7) and PR2b (feat/pr2b-i18n-shell, base=PR2a, tasks 2.4/2.8/2.9). PR3a (Phase 3a: home sections part 1 — hero, stack strip, about, skills bento; tasks 3a.1-3a.3) complete on feat/pr3a-home-core, base=feat/pr2b-i18n-shell. PR4 (Phase 4: blog MDX content pipeline + article route; tasks 4.1-4.6) complete on feat/pr4-blog, base=feat/pr3a-home-core. PR3b (Phase 3b: home sections part 2 — projects, embedded articles list, category filter, contact static shell, footer; tasks 3b.1-3b.4) complete on feat/pr3b-home-content, base=feat/pr4-blog. PR5a (Phase 5a: persistence schema, generated migration, CI migration wiring; tasks 5a.1-5a.3) complete on feat/pr5a-persistence-schema, base=feat/pr3b-home-content. PR5b (Phase 5b: persistence repository interfaces + Drizzle implementations for contact/engagement + shared rate-limit; tasks 5b.1-5b.2) complete on feat/pr5b-persistence-repos, base=feat/pr5a-persistence-schema. Post-PR5b CSP dev hotfix complete on fix/csp-dev-unsafe-eval (PR #10, base=feat/pr5b-persistence-repos): dev-only 'unsafe-eval' in script-src via buildSecurityHeaders(isDev), production headers byte-identical to ADR-0007. Green after hotfix: 221/221 unit tests, coverage 97.48%/92.16%/97.95%/97.44%.

      PR6 (Phase 6: contact API + form; tasks 6.1-6.6) complete on feat/pr6-contact, base=fix/csp-dev-unsafe-eval (new chain tip, feature-branch-chain — see tasks.md). Ships: Zod-validated `POST /api/contact` (400 on invalid), persistence + Resend email with 200/202/503 three-way degradation (`submitContactMessage` use-case owns check-order rate-limit -> honeypot -> validation, in `application` not the route handler), Postgres fixed-window rate limit (3/10min) + honeypot spam mitigation, the functional `ContactForm` wired into PR3b's static shell via app/-level composition (home never imports contact directly), Playwright e2e for the submit flow (honeypot + malformed-payload real server round-trips, not just client-constraint checks), and the `/privacy` disclosure page (es/en) linked from the footer. Added `application -> shared` eslint-boundaries edge (contact's use-case needs `RateLimitRepository`/`checkRateLimit` from `shared/rate-limit/*`, anticipated by PR5b's own findings). New optional env vars `CONTACT_EMAIL_TO`/`CONTACT_EMAIL_FROM`. Green: lint, typecheck, 272/272 unit tests (up from 221), coverage 97.88%/93.77%/98.18%/97.85% (up from 97.48/92.16/97.95/97.44, no regression), build (16 routes, up from 13), 32/32 e2e (up from 27, verified against a real local Docker Postgres container — Docker was actually available this session, unlike PR5a/PR5b/the hotfix). 1923 hand-written changed lines (1833 insertions / 90 deletions, excl. package-lock.json, measured via git diff --stat) — above the 400-line budget, disclosed with atomic-unit justification (see PR6 apply findings).

      PR7 (Phase 7: engagement views/reactions; tasks 7.1-7.5) complete on feat/pr7-engagement, base=feat/pr6-contact (new chain tip, feature-branch-chain). Ships: `visitor_hash` value object (`deriveVisitorHash`, HMAC-SHA256(IP+UA), `shared/security`), `POST /api/engagement/views` and `POST /api/engagement/reactions` (insert-if-absent permanent dedupe, both endpoints always 204, unknown slug 404, each with its own independent 20/min `ip_hash` rate-limit budget — `recordArticleView`/`recordArticleReaction` own the rate-limit -> validate -> unknown-slug-reject -> persist orchestration in `application`, not the route handler), `GET /api/engagement/[slug]` public aggregate read (`{views, reactions}`, no identifiers, `Cache-Control: public, s-maxage=60` on 200 only, 60/min budget, 503 on DB failure), and the `features/engagement/ui` widget (`useEngagement` hook firing exactly one view POST post-hydration, `ReactionButton`/`EngagementPanel`, optimistic reaction increment + localStorage-persisted 'reacted' flag, counts hidden on a failed summary read) mounted into the PR4 article page via a new `ArticlePage` children slot (same composition pattern as PR6's `ContactSection`). New `ArticleSlugChecker` domain port + MDX-backed infrastructure implementation validates slugs against the same published-article set PR4's `generateStaticParams` uses, with zero cross-feature import of `blog`. No new env vars (`VISITOR_HASH_SECRET` was already required since PR1) and zero new eslint-boundaries edges (every dependency PR7 needed was already legal from PR5b/PR6/PR4's prior additions). Self-caught and fixed a literal NUL byte in `derive-visitor-hash.ts` that made the file diff as binary (small follow-up commit, zero behavior change). Green: lint, typecheck, 340/340 unit tests (up from 272), coverage 98.30%/93.98%/98.43%/98.28% (up from 97.88/93.77/98.18/97.85 on all four metrics), build (19 routes, up from 16), 32/32 e2e (unchanged from PR6 — no dedicated e2e task in scope; the existing `e2e/blog.spec.ts` already exercises the mounted widget's real view POST against Docker Postgres). First e2e run showed 3 spurious `contact.spec.ts` failures from a stale pre-existing dev server on port 3000 (same hazard class as PR3a's documented finding, not a PR7 regression) — resolved by killing it and re-running with `CI=1`. 2021 hand-written changed lines (2018 insertions / 3 deletions, excl. package-lock.json — zero new dependencies, measured via git diff --stat) — above the 400-line budget, disclosed with atomic-unit justification (see PR7 apply findings).

      PR8 (Phase 8: search sync script + FTS API + UI; tasks 8.1-8.4) complete on feat/pr8-search, base=feat/pr7-engagement (new chain tip, feature-branch-chain). Ships: `scripts/sync-search.ts` (full reconcile — upsert + prune — against `article_search`, per-locale regconfig `search_vector` weighting via a new `ArticleSearchRepository` domain interface + Drizzle implementation, verified against pglite for `websearch_to_tsquery`/`ts_rank`/special-character parity), `GET /api/search` (Zod-validated `q`/`locale`, its own independent 30/min `ip_hash` rate-limit budget, rate-limit -> validate -> query check order), and a debounced (300ms) `ArticleSearchInput` (search/ui) mounted above the home articles list's category filter pills via a new bidirectional composition-root client wrapper (`app/[locale]/_components/articles-with-search.tsx`) — search results replace the normal list in place while active, visually deactivate any selected category pill, and selecting a pill during an active search resets the search widget. CI's previously-placeholder \"Sync search index\" step now runs `npm run db:sync-search`. Added the missing same-feature `domain -> domain` eslint-boundaries edge (first `domain` file in this project with real branching logic — `regconfigForLocale` — needed by its own co-located unit test). No new env vars; zero new dependencies (package-lock.json untouched). Green: lint, typecheck, 403/403 unit+integration tests (up from 340), coverage 97.79%/94.00%/97.35%/97.75% (branches exceed PR7's 93.98%; stmts/funcs/lines marginally below PR7's 98.30/98.43/98.28, fully attributable to the first CLI-entrypoint file's irreducible dispatch-guard lines, see PR8 apply findings), build (20 routes, up from 19 — adds `GET /api/search`), 36/36 e2e (up from 32/32 — 4 new search scenarios), run against a real local Docker Postgres container after `npm run db:migrate` + `npm run db:sync-search`. Proactively checked and killed a stale dev server on port 3000 before the e2e run (same recurring hazard class as PR3a/PR7). 2047 hand-written changed lines (2033 insertions / 14 deletions, excl. package-lock.json) — above the 400-line budget, disclosed with atomic-unit justification (see PR8 apply findings).

      PR9 (Phase 9: SEO pack — OG images, RSS, sitemap; tasks 9.1-9.3) complete on feat/pr9-seo, base=feat/pr8-search (new chain tip, feature-branch-chain). Ships: `app/[locale]/blog/[slug]/opengraph-image.tsx` (per-article, per-locale OG image via `next/og`, reusing the existing `getArticle` fallback resolution so a missing-translation request already renders the content locale's title/image), `app/[locale]/rss.xml/route.ts` (per-locale RSS 2.0 feed via a new unit-tested `buildRssFeed` pure function, entries limited to that locale's actual MDX files, its own `hasLocale` 404 guard since Route Handlers are not wrapped by `layout.tsx`), and `app/sitemap.ts` (bilingual hreflang sitemap via a new unit-tested `buildArticleSitemapEntries` pure function, reusing task 4.5's `resolveArticleSeoAlternates` so the sitemap and each article's own canonical/hreflang tags stay consistent by construction). Extracted `resolveAvailableArticleLocales` out of `page.tsx` into a shared, tested `blog/application` function (small refactor, own commit) so `generateMetadata` and the sitemap answer \"which locales exist for this slug\" identically. Fixed a `metadataBase` gap surfaced by the new OG image route (added to the locale layout's `metadata` export, reusing the existing `NEXT_PUBLIC_SITE_URL`). No new env vars; zero new dependencies (package-lock.json untouched); zero new eslint-boundaries edges. Green: lint, typecheck, 416/416 unit tests (up from 403), coverage 97.86%/94.00%/97.47%/97.82% (no regression on any metric), build (22 routes, up from 20), 44/44 e2e (up from 36/36 — 8 new `e2e/seo.spec.ts` scenarios), run against a real local Docker Postgres container after `npm run db:migrate` + `npm run db:sync-search`, with `CI=1` (one unrelated `smoke.spec.ts` flake on the first run, resolved by Playwright's own retry; a clean second full run confirmed it was not a PR9 regression). 773 hand-written changed lines (759 insertions / 14 deletions, excl. package-lock.json) — above the 400-line budget but the smallest above-budget PR in this chain since PR3a, disclosed with atomic-unit justification (see PR9 apply findings). No `app/robots.ts` shipped (out of scope — no owning task; flagged as a residual gap for PR11 or a future dedicated task).

      PR10 (Phase 10: GitHub activity — last implementation slice; tasks 10.1-10.4) complete on feat/pr10-github-activity, base=feat/pr9-seo (new chain tip, feature-branch-chain). Ships: `features/github-activity/infrastructure/create-github-activity-client.ts` (GitHub REST client, `GITHUB_TOKEN` Bearer auth, 3 parallel GET requests — profile, top repos, recent public events — each Zod-validated and `next: {revalidate: 3600}`-cached, `AbortController` timeout), `features/github-activity/application/get-github-activity.ts` (use-case: absent token short-circuits to the identical `{kind:\"unavailable\"}` fallback as any client failure, never constructing a request), and `features/github-activity/ui` (`GithubActivityPanel`/`GithubActivityLoading`, purely presentational, `id=\"github-activity\"`). Wired into the home page via a new `app/[locale]/_components/github-activity-async.tsx` composition root, streamed with `<Suspense>` (github-activity: Non-Blocking Render). Fixed a real `next build` failure by adding `export const dynamic = \"force-dynamic\"` to the home page — `GithubActivityAsync` calls `getEnv()`, which fail-fasts on a missing `DATABASE_URL` at build time otherwise, violating design.md's \"`next build` MUST NOT require `DATABASE_URL`\" constraint; this also makes the fetch-level `revalidate: 3600` caching meaningful (a static page would freeze the result at build time forever). Fixed a real e2e regression: `role=\"status\"` on the fallback/loading panels collided with `ContactForm`'s own `role=\"status\"` once both were simultaneously present on the page (no `GITHUB_TOKEN` in CI/local -> fallback always renders) — switched to `aria-live=\"polite\"` without an explicit role. Also updated `SectionNav`/`home.nav.githubActivity` (i18n) to keep the nav's own residual comment honest and the In-Page Navigation requirement satisfied for the new ninth section — a small extension of 10.4's scope, not a separately-tasked item. No new env vars (`GITHUB_TOKEN` already in the schema since PR1); zero new dependencies; zero new eslint-boundaries edges. Green: lint, typecheck, 430/430 unit tests (up from 416), coverage 97.97%/93.99%/97.60%/97.94% (no regression against the 80% gate on any metric), build (22 routes, unchanged — `/[locale]` switches Static -> Dynamic), 44/44 e2e (same count as PR9, one existing test extended — the `role=\"status\"` collision was a real regression caught and fixed before this run, not a flake), run against a real local Docker Postgres container after `npm run db:migrate` + `npm run db:sync-search`. 760 hand-written changed lines (739 insertions / 21 deletions, excl. package-lock.json) — above the 400-line budget, disclosed with atomic-unit justification (see PR10 apply findings). Phase 11 (hardening & verify) remains — this was the last implementation slice per tasks.md's PR table.

      PR11 (Phase 11: Hardening & Verify — FINAL implementation slice; tasks 11.1-11.5) complete on feat/pr11-hardening, base=feat/pr10-github-activity (new chain tip, feature-branch-chain). Ships: `e2e/smoke.spec.ts` extended to assert the full security header set on a real API response, not just a page (11.1 — zero drift found in the ADR-0007 header set itself); `scripts/verify-no-client-secrets/find-leaked-secrets.ts` (pure scan) + `scripts/verify-no-client-secrets.ts` (CLI, same thin-adapter pattern as `sync-search.ts`) scanning `.next/static` only for leaked secret env var values, wired into CI's `e2e` job right after `Build` (11.2 — zero leaks found against a real build with canary secret values injected); a real coverage-gate integrity bug found and fixed — pglite integration tests intermittently exceeded Vitest's 5000ms default timeout under full-suite parallel/coverage load (rotating failures across different files each run, not a single flaky test) — fixed via `testTimeout`/`hookTimeout: 20000` in `vitest.config.ts`, verified stable across multiple consecutive full runs; a full coverage-exclusions review (all six existing exclusions re-confirmed justified, none expanded); `lighthouserc.js` (Lighthouse CI budget, mobile default, `numberOfRuns: 3`, Performance>=90/Accessibility>=95/Best Practices>=95/SEO>=95 against `/es`, `/en`, and an article page) wired into CI's `lighthouse` job as a real blocking gate (`continue-on-error` removed); a real Lighthouse-driven performance bug found and fixed via strict TDD — the hero section's above-the-fold content was wrapped in `Reveal` (framer-motion `whileInView`, initial `opacity: 0` until hydration+IntersectionObserver), adding ~3.4s of pure LCP \"Render Delay\" and failing the Performance budget (0.88-0.89); fixed by removing `Reveal` from the hero (kept on all below-the-fold sections where it belongs), Performance stabilized at 0.90-0.96 across all three measured pages (11.3); README badges switched from static placeholders to live GitHub Actions per-job status badges via shields.io's `job` query parameter (11.3); `e2e/engagement.spec.ts` (3 new cases) closing a genuine quality-pipeline E2E Test Gate gap — engagement previously had no dedicated e2e coverage, only an incidental side effect of `blog.spec.ts` (11.4 — full flow list now genuinely covered: locale switch, theme, filter, search, contact, article view, engagement, github activity); all seven `docs/adr/000N-*.md` files finalized from `Status: Draft (stub)` to `Status: Accepted`, each with a new Consequences section grounded in what actually shipped (11.5). No new env vars; one new devDependency (`@lhci/cli`); zero new eslint-boundaries edges. Green: lint, typecheck, 440/440 unit tests (up from 430), coverage 97.47%/93.48%/96.18%/97.42% (small nominal dip from PR10's 97.97/93.99/97.60/97.94 driven entirely by the two new CLI-wiring files' own uncovered wiring lines, same category as `sync-search.ts`; still comfortably above the 80% gate on every metric), build (22 routes, unchanged), `npm run verify:no-client-secrets` (zero leaks against a real build with canary secrets), `npm run lighthouse` (all three URLs pass all four thresholds, verified stable across 6 samples/URL), 48/48 e2e (up from 44/44), run against a real local Docker Postgres container (already running from a prior session) after `npm run db:migrate` + `npm run db:sync-search`, with `CI=1` and a stale dev-server process killed first (same recurring hazard class as PR3a/PR7/PR8/PR9). 747 hand-written changed lines (677 insertions / 70 deletions, excl. package-lock.json) — above the 400-line budget, disclosed with atomic-unit justification (see PR11 apply findings). **This is the final implementation slice in the chain** — no further PRs are planned; `sdd-verify` is next.

      **PR11 resolve-blockers (2026-07-07)**: CRITICAL-1 (verify-report.md) fixed on `feat/pr11-hardening` — added `min-w-0` to the repo-card grid item (`<li>`) and its flex-container child (`<a>`) in `github-activity-panel.tsx`, the standard fix for the CSS Grid `min-width: auto` overflow gotcha the verify report diagnosed. Added a unit test asserting the guard classes with a realistic long description; the two previously-failing `e2e/home-sections.spec.ts` mobile-viewport scenarios now pass (reproduced RED first against a real `GITHUB_TOKEN`, confirmed GREEN after the fix against a freshly rebuilt production server — the first e2e run after the fix falsely reused a stale pre-fix server via Playwright's `reuseExistingServer`, caught and corrected by killing it and rebuilding before re-running). Green: lint, typecheck, 441/441 unit tests (up from 440), coverage 97.47%/93.48%/96.18%/97.42% (unchanged), 48/48 e2e (up from 46/48). Commit `b721b69`, pushed to `feat/pr11-hardening`.

      **PR12 (user-approved scope addition, not a tasks.md phase — decided during this resolve-blockers session): tech logos.** New branch `feat/pr12-tech-logos`, base=`feat/pr11-hardening` (new chain tip). Replaces `SkillBadge`'s monogram-text placeholder (documented deviation since PR3a) with the real devicon brand SVGs the design-reference uses. Vendors 10 SVG files directly from the `devicon` npm package (v2.17.0, MIT) under `src/features/home/ui/icons/` — not added as a dependency (fetched once via `npm pack` into a temp dir). Covers docker/figma/git/javascript/nodejs/php/postgresql/react/typescript (each mapped to its `-original.svg`, the inherently multi-color variant — the design-reference's `-plain colored` CSS-font classes have no direct raw-SVG equivalent, `-original.svg` is the correct substitute) plus Next.js (`-plain.svg`, patched to `fill=\"currentColor\"` since its upstream default-black fill is invisible in dark mode, documented in the component). Found and fixed a real, would-have-been-silent bug: `nodejs-original.svg` and `php-original.svg` both use the bare gradient id `a` upstream, and both icons render inline on the same skills-section page — namespaced to `nodejs-icon-*`/`php-icon-a` to prevent a DOM id collision (empirically verified unique on the real built page, one instance each). `SkillBadge` now takes `icon: IconName` instead of `label: string`; `SkillEntry.icon` (`skills-data.ts`) replaces `SkillEntry.badge`, matching design-reference/'s `devicon-{name}-*` classes 1:1 for every skill card plus the main-stack card (React/TypeScript/Node.js). Icons stay `aria-hidden`, all existing accessible text unchanged. CSP (ADR-0007, `style-src 'self'`) unaffected — no font, no CDN, self-hosted inline SVG only. TDD throughout (RED confirmed for icons.test.tsx's import-resolution failure, skill-badge.test.tsx's icon-presence assertion, and skills-section.test.tsx's per-card icon-mapping assertion, before each corresponding implementation). Green: lint, typecheck, 457/457 unit tests (up from 441), coverage 97.51%/93.48%/96.32%/97.46% (no regression), build (22 routes, unchanged), 48/48 e2e. ~751 changed lines (2 commits: `e672ba2` icon vendoring, `d50bb5b` UI wiring) — above the 400-line budget but the large majority is vendored SVG path data, not hand-authored logic (disclosed in the PR body per the chained-pr skill's generated-content guidance, kept as one PR rather than split further). PR #17, open, non-draft, base=`feat/pr11-hardening` — https://github.com/andresvalencia72/valenciafullstack/pull/17."
