# Bootstrap config — active by default (this file ships with the standard
# `.conf` extension nginx auto-loads). Serves the app over plain HTTP so the
# site is reachable, and the ground truth, before any TLS certificate
# exists. Once `infra/nginx/conf.d/default.ssl.conf.disabled` is enabled per
# infra/README.md's TLS bootstrap step, DELETE or rename this file away from
# `.conf` (both files must never be active at the same time — they'd both
# try to `listen 80` for the same server_name).
#
# Does NOT set Content-Security-Policy, X-Frame-Options, or any other
# security header here — the Next.js app already sets its full header set
# on every response (see shared/config/security-headers.ts, ADR-0007);
# nginx only adds proxy/forwarding headers and must not shadow or conflict
# with the app's own CSP.

server {
    listen 80;
    listen [::]:80;
    server_name valenciafullstack.tech www.valenciafullstack.tech;

    # certbot's HTTP-01 challenge — written into the shared webroot volume
    # by the `certbot` service, read here so Let's Encrypt can verify
    # domain ownership before any certificate exists.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://app_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
        text/xml application/xml application/xml+rss text/javascript
        image/svg+xml;
}
