# ACTIVE production config (standard `.conf` extension — nginx's
# `include conf.d/*.conf` loads this on every container start/reload).
# Requires a real certificate at the paths below — it exists, in the
# `certbot-certs` Docker volume, issued once via the manual TLS bootstrap
# step in infra/README.md (the cert lives in a volume, so it survives
# `git reset`/container recreation; only the nginx *config* is versioned
# here, separately from the cert data).
#
# On a genuinely fresh server (no certificate issued yet), THIS file
# cannot start nginx — `ssl_certificate`/`ssl_certificate_key` point at
# files that don't exist pre-issuance, and nginx refuses to start with a
# missing cert. For that one-time case only, see
# `default.http-bootstrap.conf.disabled` and infra/README.md's TLS
# bootstrap section — a local, uncommitted, throwaway config swap that
# the next `develop` deploy automatically discards (deploy.yml runs
# `git reset --hard && git clean -fd` before every deploy, specifically
# so a local nginx config edit can never silently survive past one
# deploy cycle and drift from what's committed here).
#
# Same "no security headers here" rule as the bootstrap config — the app
# sets its own full header set; nginx only proxies and redirects.

server {
    listen 80;
    listen [::]:80;
    server_name valenciafullstack.tech www.valenciafullstack.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name valenciafullstack.tech www.valenciafullstack.tech;

    ssl_certificate     /etc/letsencrypt/live/valenciafullstack.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/valenciafullstack.tech/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Kept for certbot's renewal requests, which still arrive over HTTP
    # (the redirect above in the :80 server block only applies to browser
    # traffic; certbot's own `renew --webroot` writes here directly).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://app_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Reset, not append: nginx is the internet-facing edge with no
        # further trusted proxy in front of it, and
        # shared/security/resolve-client-ip.ts trusts the FIRST
        # X-Forwarded-For entry unconditionally (safe only behind a
        # sanitizing edge). `$proxy_add_x_forwarded_for` APPENDS to
        # whatever the client already sent, so a client-supplied
        # `X-Forwarded-For: <spoofed-ip>` would survive as the first
        # entry and defeat ip_hash-keyed rate limiting on every
        # rate-limited endpoint. Overwrite with `$remote_addr` instead —
        # the one value nginx itself observed and the client cannot forge.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
        text/xml application/xml application/xml+rss text/javascript
        image/svg+xml;
}
